# Datasource
quarkus.datasource.db-kind=mysql
quarkus.datasource.username=${QUARKUS_DATASOURCE_USERNAME:root}
quarkus.datasource.password=${QUARKUS_DATASOURCE_PASSWORD:}
quarkus.datasource.jdbc.url=${QUARKUS_DATASOURCE_JDBC_URL:jdbc:mysql://localhost:3306/statusscope}

# Schema and seed
quarkus.hibernate-orm.schema-management.strategy=drop-and-create
quarkus.hibernate-orm.sql-load-script=import.sql
quarkus.flyway.migrate-at-start=false
quarkus.flyway.baseline-on-migrate=true
quarkus.flyway.baseline-version=0

# Explicit destructive demo profile.
%demo.quarkus.hibernate-orm.schema-management.strategy=drop-and-create
%demo.quarkus.hibernate-orm.sql-load-script=import.sql
%demo.quarkus.flyway.migrate-at-start=false
%demo.quarkus.flyway.baseline-on-migrate=true
%demo.quarkus.flyway.baseline-version=0

# Persistent local DB profile.
# Use this after your DB has already been brought to the current schema.
%local-persistent.quarkus.hibernate-orm.schema-management.strategy=validate
%local-persistent.quarkus.hibernate-orm.sql-load-script=no-file
%local-persistent.quarkus.flyway.migrate-at-start=true
%local-persistent.quarkus.flyway.baseline-on-migrate=true
%local-persistent.quarkus.flyway.baseline-version=4
%local-persistent.quarkus.flyway.repair-at-start=true

# One-time local upgrade profile for an older existing DB.
# Hibernate adds missing base tables/columns, then Flyway applies only post-V4 migrations.
%local-schema-update.quarkus.hibernate-orm.schema-management.strategy=update
%local-schema-update.quarkus.hibernate-orm.sql-load-script=no-file
%local-schema-update.quarkus.flyway.migrate-at-start=false
%local-schema-update.quarkus.flyway.baseline-on-migrate=true
%local-schema-update.quarkus.flyway.baseline-version=4

# Prod profile - Cloud Run / Cloud SQL. Required values come from runtime secrets.
%prod.quarkus.http.host=0.0.0.0
%prod.quarkus.http.port=${PORT:8080}
%prod.quarkus.datasource.db-kind=mysql
%prod.quarkus.datasource.username=${QUARKUS_DATASOURCE_USERNAME}
%prod.quarkus.datasource.password=${QUARKUS_DATASOURCE_PASSWORD}
%prod.quarkus.datasource.jdbc.url=${QUARKUS_DATASOURCE_JDBC_URL}
%prod.quarkus.hibernate-orm.schema-management.strategy=validate
%prod.quarkus.hibernate-orm.sql-load-script=no-file
%prod.quarkus.flyway.migrate-at-start=false
%prod.quarkus.flyway.baseline-on-migrate=true
%prod.quarkus.flyway.baseline-version=4
%prod.outbreak.ingestion.import-at-start=${OUTBREAK_INGESTION_IMPORT_AT_START:false}
%prod.statusscope.admin.recommendations.llm.enabled=${ADMIN_RECOMMENDATIONS_LLM_ENABLED:false}

# Logging — SQL only in dev; never expose query details in production
%dev.quarkus.hibernate-orm.log.sql=true
%dev.quarkus.hibernate-orm.log.format-sql=true
%prod.quarkus.hibernate-orm.log.sql=false
%prod.quarkus.hibernate-orm.log.format-sql=false

# CORS
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=http://localhost:8080,http://localhost:8081,http://localhost:19000,http://localhost:19006,http://localhost:3000
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
%prod.quarkus.http.cors.origins=${QUARKUS_HTTP_CORS_ORIGINS}

# Firebase
firebase.service-account-location=${FIREBASE_SA_PATH:src/main/resources/firebase-service-account.json}
%test.firebase.service-account-location=none

# OpenAPI — expose spec at /q/openapi; disable Swagger UI in production
quarkus.smallrye-openapi.info-title=StatuScope API
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.smallrye-openapi.info-description=Health outbreak monitoring and hospital management API
%prod.quarkus.swagger-ui.enable=false

# Dev seeder
statusscope.dev-seeder.seed-password=${DEV_SEEDER_SEED_PASSWORD}

# Feature flags
auth.registration.public-enabled=true

# Geographic radius used by diagnosis assistant outbreak context.
geo.assistant-radius-km=${GEO_ASSISTANT_RADIUS_KM:75}

# Opt-in demo diagnosis data for local UI walkthroughs.
diagnosis.assistant.seed-demo-data=${DIAGNOSIS_ASSISTANT_SEED_DEMO_DATA:false}

# Refresh managed municipal outbreak rows from data/outbreaks/municipal_outbreaks.csv after Flyway seeds.
outbreak.ingestion.import-at-start=${OUTBREAK_INGESTION_IMPORT_AT_START:true}

# Hospital admin operational recommendations
statusscope.admin.recommendations.scheduler.enabled=${ADMIN_RECOMMENDATIONS_SCHEDULER_ENABLED:false}
statusscope.admin.recommendations.refresh-at-start=${ADMIN_RECOMMENDATIONS_REFRESH_AT_START:false}
statusscope.admin.recommendations.refresh-interval=${ADMIN_RECOMMENDATIONS_REFRESH_INTERVAL:6h}
statusscope.admin.recommendations.llm.enabled=${ADMIN_RECOMMENDATIONS_LLM_ENABLED:true}

# Operational email delivery
statusscope.mail.enabled=${STATUSSCOPE_MAIL_ENABLED:false}
statusscope.mail.from=${STATUSSCOPE_MAIL_FROM:StatuScope <no-reply@statusscope.local>}
quarkus.mailer.host=${QUARKUS_MAILER_HOST:localhost}
quarkus.mailer.port=${QUARKUS_MAILER_PORT:1025}
quarkus.mailer.username=${QUARKUS_MAILER_USERNAME:}
quarkus.mailer.password=${QUARKUS_MAILER_PASSWORD:}
quarkus.mailer.start-tls=${QUARKUS_MAILER_START_TLS:OPTIONAL}
quarkus.mailer.mock=${QUARKUS_MAILER_MOCK:false}

# OpenAI
openai.api-key=${OPENAI_API_KEY:}
openai.model=${OPENAI_MODEL:gpt-4o}
openai.temperature=${OPENAI_TEMPERATURE:0.2}
openai.timeout-seconds=${OPENAI_TIMEOUT_SECONDS:30}

quarkus.rest-client."com.itesm.infrastructure.openai.OpenAiHttpClient".url=https://api.openai.com/v1
quarkus.rest-client."com.itesm.infrastructure.openai.OpenAiHttpClient".connect-timeout=10000
quarkus.rest-client."com.itesm.infrastructure.openai.OpenAiHttpClient".read-timeout=30000

# Gemini
gemini.api-key=${GEMINI_API_KEY:}
gemini.model=${GEMINI_MODEL:gemini-2.5-flash}
gemini.temperature=${GEMINI_TEMPERATURE:0.2}

quarkus.rest-client."com.itesm.infrastructure.gemini.GeminiHttpClient".url=https://generativelanguage.googleapis.com/v1beta
quarkus.rest-client."com.itesm.infrastructure.gemini.GeminiHttpClient".connect-timeout=10000
quarkus.rest-client."com.itesm.infrastructure.gemini.GeminiHttpClient".read-timeout=30000

%test.openai.api-key=test-key
%test.gemini.api-key=test-key
%test.statusscope.mail.enabled=true
%test.quarkus.mailer.mock=true

# Test profile
%test.quarkus.datasource.db-kind=h2
%test.quarkus.datasource.username=sa
%test.quarkus.datasource.password=
%test.quarkus.datasource.jdbc.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
%test.quarkus.hibernate-orm.schema-management.strategy=drop-and-create
%test.quarkus.hibernate-orm.sql-load-script=import.sql
%test.quarkus.flyway.migrate-at-start=false
%test.quarkus.flyway.baseline-on-migrate=true
%test.quarkus.flyway.baseline-version=0
%test.statusscope.admin.recommendations.scheduler.enabled=false
%test.statusscope.admin.recommendations.refresh-at-start=false

