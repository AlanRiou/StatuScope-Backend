name: OWASP ZAP - Backend API Scan

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: 'Backend base URL (e.g. https://statusscope-backend-xxx-uc.a.run.app)'
        required: true
  schedule:
    - cron: '0 4 * * 1'

jobs:
  zap-api-scan:
    name: ZAP API Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve target URL
        id: target
        run: |
          URL="${{ github.event.inputs.target_url || vars.BACKEND_URL }}"
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "openapi_url=${URL}/q/openapi" >> "$GITHUB_OUTPUT"

      - name: Create ZAP rules file
        run: |
          cat > zap-rules.tsv << 'EOF'
          10202	IGNORE	(Absence of Anti-CSRF Tokens)
          10015	IGNORE	(Incomplete or No Cache-control Header Set)
          10111	IGNORE	(Authentication Request Identified)
          EOF

      - name: ZAP API Scan against OpenAPI spec
        uses: zaproxy/action-api-scan@v0.9.0
        with:
          target: ${{ steps.target.outputs.openapi_url }}
          format: openapi
          rules_file_name: zap-rules.tsv
          cmd_options: '-a -j'

      - name: Upload ZAP Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-backend-report-${{ github.run_number }}
          path: |
            report_json.json
            report_html.html
          retention-days: 30
