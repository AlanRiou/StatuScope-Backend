name: Trivy - Container & Dependency Scan

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 5 * * 1'
  workflow_dispatch:

jobs:
  trivy-fs:
    name: Trivy Filesystem Scan
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      security-events: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin

      - name: Download Trivy vulnerability DB
        run: trivy fs --download-db-only .

      - name: Run Trivy filesystem scan
        run: |
          trivy fs . \
            --format sarif \
            --output trivy-fs-results.sarif \
            --severity CRITICAL,HIGH \
            --exit-code 0 \
            --offline-scan

      - name: Upload Trivy filesystem results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-fs-results.sarif
          category: trivy-filesystem

  trivy-container:
    name: Trivy Container Image Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build JAR
        env:
          QUARKUS_DATASOURCE_USERNAME: build
          QUARKUS_DATASOURCE_PASSWORD: build
          QUARKUS_DATASOURCE_JDBC_URL: jdbc:h2:mem:build
        run: |
          chmod +x ./mvnw
          ./mvnw package -DskipTests -q

      - name: Build container image
        run: docker build -t statusscope-backend:scan .

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin

      - name: Run Trivy container image scan
        run: |
          trivy image statusscope-backend:scan \
            --format sarif \
            --output trivy-image-results.sarif \
            --severity CRITICAL,HIGH \
            --exit-code 0

      - name: Upload Trivy container results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-image-results.sarif
          category: trivy-container

      - name: Export human-readable report
        run: |
          trivy image statusscope-backend:scan \
            --format table \
            --severity CRITICAL,HIGH

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-container-report-${{ github.run_number }}
          path: trivy-image-results.sarif
          retention-days: 30
